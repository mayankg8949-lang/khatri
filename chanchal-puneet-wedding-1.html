<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chanchal and Puneet's Wedding Invitation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .invitation {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: auto;
        }
        h1 {
            color: #6c63ff;
            text-align: center;
        }
        .details {
            margin-top: 20px;
        }
        .date {
            font-size: 20px;
            font-weight: bold;
        }
        .rsvp {
            margin-top: 30px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="invitation">
        <h1>You're Invited to the Wedding of Chanchal and Puneet!</h1>
        <div class="details">
            <p class="date">April 20, 2026</p>
            <p><strong>Venue:</strong> The Grand Ballroom, City Center</p>
            <p><strong>Time:</strong> 5:00 PM</p>
        </div>
        <div class="rsvp">
            <p>Please RSVP by April 1, 2026</p>
        </div>
    </div>
</body>
</html>
